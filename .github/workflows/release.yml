name: Compilar y Publicar Electron

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Compilar en ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    # Detiene la cancelación en cadena si una máquina falla
    # Incrementa el tiempo límite de ejecución a 30 minutos por máquina
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Compilar y empaquetar aplicación
        run: pnpm run build -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}          